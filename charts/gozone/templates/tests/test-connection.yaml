apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "gozone.fullname" . }}-test-connection"
  labels:
    {{- include "gozone.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: docker.io/library/busybox
      command: ['wget']
      args: ['{{ include "gozone.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
