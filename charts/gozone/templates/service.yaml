apiVersion: v1
kind: Service
metadata:
  name: {{ include "gozone.fullname" . }}
  labels:
    {{- include "gozone.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ipFamilies:
    {{- with .Values.service.ipFamilies }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  ipFamilyPolicy: {{ .Values.service.ipFamilyPolicy }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gozone.selectorLabels" . | nindent 4 }}
